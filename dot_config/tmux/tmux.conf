set -g prefix C-Space
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1 # Escape後の入力待ち時間を1msに短縮する

# ウィンドウのインデックスを1から始める
set -g base-index 1 # 画面上のウィンドウ番号表示を1始まりにする

# ペインのインデックスを1から始める
set -g pane-base-index 1 # 新規ペインの番号付けを1始まりに揃える

set -g history-limit 50000 # スクロールバッファを50000行に拡大する
set -g display-time 4000 # ステータスメッセージを4秒間表示する
set -g status-interval 5 # ステータスバーを5秒ごとに更新する
set -g focus-events on # フォーカスイベントをNeovim等に転送する(FocusGained/FocusLostに必須)
setw -g aggressive-resize on # 複数クライアント接続時にウィンドウサイズを最適化する

# 設定ファイルをリロードする
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!" # プレフィックス+rで設定を再読み込みする

# | でペインを縦に分割する
bind | split-window -h # プレフィックス+|で左右分割を行う

# - でペインを横に分割する
bind - split-window -v # プレフィックス+-で上下分割を行う

# c で現在ペインのディレクトリを引き継いで新規ウィンドウを作成する
bind c new-window -c "#{pane_current_path}"

# vim のキーバインドでペインを移動する
bind h select-pane -L # hキーで左ペインにフォーカスを移す
bind j select-pane -D # jキーで下ペインにフォーカスを移す
bind k select-pane -U # kキーで上ペインにフォーカスを移す
bind l select-pane -R # lキーで右ペインにフォーカスを移す
bind -r C-h select-window -t :- # Ctrl+hを押し続けて前のウィンドウへ移動する
bind -r C-l select-window -t :+ # Ctrl+lを押し続けて次のウィンドウへ移動する

# vim のキーバインドでペインをリサイズする
bind -r H resize-pane -L 5 # Shift+hを押し続けて左方向へ5セルずつリサイズする
bind -r J resize-pane -D 5 # Shift+jを押し続けて下方向へ5セルずつリサイズする
bind -r K resize-pane -U 5 # Shift+kを押し続けて上方向へ5セルずつリサイズする
bind -r L resize-pane -R 5 # Shift+lを押し続けて右方向へ5セルずつリサイズする

# editprompt
bind -n M-q run-shell '\
  editprompt resume --target-pane #{pane_id} || \
  tmux split-window -v -l 20 -c "#{pane_current_path}" \
    "editprompt open --editor nvim --always-copy --target-pane #{pane_id}"'

# マウス操作を有効にする
setw -g mouse on # クリックやドラッグでペイン操作できるようにする

# 256色端末を使用する
set -g default-terminal "screen-256color" # 256色対応端末としてtmuxを起動する

# https://github.com/sainnhe/everforest
if-shell '[ "$(cat ~/.config/theme 2>/dev/null)" = "dark" ]' \
  'source ~/.config/tmux/everforest-dark.conf' \
  'source ~/.config/tmux/everforest-light.conf'

# vim: set ft=tmux tw=0 nowrap:
set -g mode-keys vi
set -g set-clipboard on

# Allow Kitty graphics protocol passthrough for image.nvim
set -gq allow-passthrough on
set -g visual-activity off

# コピーモードのキーバインド
bind-key -T copy-mode-vi Space send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy" # 選択テキストをクリップボードにコピー(コピーモード継続)
bind-key -T copy-mode-vi Y send-keys -X copy-line \; run-shell "tmux save-buffer - | pbcopy" # 現在行全体をクリップボードにコピー
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy" # 選択テキストをコピーしてコピーモード終了
bind-key -T copy-mode-vi o send-keys -X copy-pipe-no-clear "xargs open" # 選択テキストをデフォルトアプリで開く
bind-key -T copy-mode-vi C-o send-keys -X copy-pipe-no-clear "xargs -I{} tmux new-window \"$EDITOR '{}'\""  # 選択テキストを$EDITORで開く
